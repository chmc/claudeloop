name: Release
on:
  workflow_dispatch:
    inputs:
      beta:
        description: 'Create a beta (prerelease) version'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # required to push commit + tag and create release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history needed for git log since last tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Validate branch and release type
        run: |
          branch="${GITHUB_REF_NAME}"
          beta="${{ inputs.beta }}"
          if [ "$branch" = "main" ] && [ "$beta" = "true" ]; then
            echo "::error::Beta releases must come from 'beta' branch, not 'main'"
            exit 1
          fi
          if [ "$branch" = "beta" ] && [ "$beta" != "true" ]; then
            echo "::error::Stable releases must come from 'main', not 'beta'"
            exit 1
          fi

      - name: Run release script
        id: release
        run: |
          beta_arg=""
          if [ "${{ inputs.beta }}" = "true" ]; then
            beta_arg="--beta"
          fi
          rc=0
          ./release.sh $beta_arg || rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$rc" -ne 0 ]; then
            exit "$rc"
          fi

      - name: Push commit and tag
        if: steps.release.outputs.skipped != 'true'
        run: |
          git push
          git push --tags

      - name: Build release tarball
        if: steps.release.outputs.skipped != 'true'
        run: |
          tag=$(git describe --tags --abbrev=0)
          version="${tag#v}"
          mkdir -p "claudeloop-v${version}/lib"
          mkdir -p "claudeloop-v${version}/assets"
          cp claudeloop "claudeloop-v${version}/"
          cp lib/*.sh "claudeloop-v${version}/lib/"
          cp assets/replay-template.html "claudeloop-v${version}/assets/"
          mkdir -p "claudeloop-v${version}/examples"
          cp examples/* "claudeloop-v${version}/examples/"
          tar -czf "claudeloop-v${version}.tar.gz" "claudeloop-v${version}"
          echo "TARBALL=claudeloop-v${version}.tar.gz" >> "$GITHUB_ENV"
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.release.outputs.skipped != 'true'
        run: |
          prerelease_flag=""
          case "$TAG" in *-beta*) prerelease_flag="--prerelease" ;; esac
          gh release create "$TAG" "$TARBALL" --notes-file release_notes.md --title "$TAG" $prerelease_flag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
